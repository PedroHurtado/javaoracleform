<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>hello — JSF + Spring + Hibernate</title>
</h:head>
<h:body>
    <h:form id="form">
        <p:panel header="Usuarios (JSF + PrimeFaces + Spring + Hibernate)">

            <p:dataTable id="tabla" value="#{userBean.users}" var="u"
                         emptyMessage="No hay usuarios.">
                <p:column headerText="ID">
                    <h:outputText value="#{u.id}"/>
                </p:column>
                <p:column headerText="Nombre">
                    <h:outputText value="#{u.name}"/>
                </p:column>
                <p:column headerText="Email">
                    <h:outputText value="#{u.email}"/>
                </p:column>
                <p:column headerText="Acciones" style="width:8rem">
                    <p:commandButton value="Borrar" icon="pi pi-trash"
                                     action="#{userBean.delete(u.id)}"
                                     update="@form" process="@this"/>
                </p:column>
            </p:dataTable>

            <p:separator/>

            <h:panelGrid columns="2">
                <p:outputLabel for="nombre" value="Nombre:"/>
                <p:inputText id="nombre" value="#{userBean.newUser.name}" required="true"/>

                <p:outputLabel for="email" value="Email:"/>
                <p:inputText id="email" value="#{userBean.newUser.email}" required="true"/>
            </h:panelGrid>

            <p:commandButton value="Guardar" icon="pi pi-save"
                             action="#{userBean.save}" update="@form"/>

            <p:messages showDetail="true"/>
        </p:panel>
    </h:form>
</h:body>
</html>
